    <style>
      /* --- UNIFIED CTA HEIGHT & STYLE (MATCHING IMAGE) --- */
      .shiny-cta {
        position: relative;
        overflow: hidden;
        border-radius: 9999px;
        /* Standardized vertical padding to match the glass buttons */
        padding-top: 1rem;
        padding-bottom: 1rem;
        padding-left: 3rem;
        padding-right: 3rem;
        font-size: 1.125rem;
        font-weight: 600;
        color: #ffffff;
        background: linear-gradient(180deg, #47A851 0%, #2C813D 100%);
        border: 1px solid rgba(255, 255, 255, 0.15);
        box-shadow: 0 10px 25px -5px rgba(44, 129, 61, 0.4), inset 0 1px 1px rgba(255, 255, 255, 0.2);
        outline: none;
        transition: transform 0.2s, box-shadow 0.3s, filter 0.3s;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        letter-spacing: -0.01em;
        line-height: 1.5rem; /* Ensure consistent text height */
      }

      .shiny-cta:hover {
        filter: brightness(1.05);
        box-shadow: 0 15px 30px -5px rgba(44, 129, 61, 0.5);
      }

      .shiny-cta:active {
        transform: translateY(1px) scale(0.98);
      }
      
      .shiny-cta::after {
        content: '';
        position: absolute;
        top: 0;
        left: -100%;
        width: 50%;
        height: 100%;
        background: linear-gradient(
          to right,
          rgba(255, 255, 255, 0) 0%,
          rgba(255, 255, 255, 0.15) 50%,
          rgba(255, 255, 255, 0) 100%
        );
        transform: skewX(-25deg);
        transition: left 0.75s ease;
      }

      .shiny-cta:hover::after {
        left: 150%;
        transition: left 0.75s ease;
      }

      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
